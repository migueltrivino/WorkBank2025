<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workbank.W-Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Poppins:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="../css/login.css">
</head>
<body>
  
    <div class="container">
    <!-- Panel Izquierdo -->
        <div class="left-panel">
            <div class="logo">
                <img src="../img/logos.png" alt="logo">
                <a href="index.html" class="logo-text">Workbank.W</a>
            </div>
            <div class="message-welcome">
                <h1>BIENVENIDO</h1>
                <p>Recuerda notificarnos cualquier problema que tengas, para nosotros tu opinión es la más valiosa</p>
                <a href="mailto:Workbank2025oficial@gmail.com">Workbank2025oficial@gmail.com</a>
            </div>
            <div class="container-socials">
                <p>"Haz tareas simples, gana sin complicaciones"</p>
                <div class="socials">
                    <i class="fab fa-facebook icon-facebook"></i>
                    <i class="fab fa-instagram icon-instagram"></i>
                    <i class="fab fa-whatsapp icon-whatsapp"></i>
                    <i class="fab fa-tiktok icon-tiktok"></i>
                </div>
            </div>
        </div>

        <!-- Panel Derecho -->
        <div class="right-panel">
            <h2>Iniciar sesión</h2>
            <form id="loginForm">
                <label for="email">Correo electrónico</label>
                <input type="email" id="email" placeholder="ejemplo@gmail.com" required>

                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="********" required>

                <div class="forgot"><a href="#">¿Olvidó su contraseña?</a></div>
                <button type="submit" class="btn">Ingresar</button>

                <button type="button" class="btn google-btn">
                    <img src="../img/google.png" alt="Google"> Continuar con Google
                </button>
            </form>
            <div class="register">
                ¿Nuevo en Workbank? <a href="">Crea tu cuenta</a>
            </div>
        </div>
    </div>

<script src="../js/login.js"></script>
</body>
</html>
